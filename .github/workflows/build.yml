name: Build Linux Pool Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: Build Linux AMD64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo clean
          cargo build --release

      - name: Package
        run: |
          cp target/release/midstate midstate-pool-fast-linux-amd64
          cp target/release/midstate midstate-linux-amd64
          sha256sum midstate-pool-fast-linux-amd64 midstate-linux-amd64 > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: midstate-linux-amd64
          path: |
            midstate-pool-fast-linux-amd64
            midstate-linux-amd64
            SHA256SUMS.txt

  release:
    name: Publish Linux Release
    needs: build-linux-amd64
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/midstate-pool-fast-linux-amd64
            release/midstate-linux-amd64
            release/SHA256SUMS.txt
          generate_release_notes: true
