name: Build Release Binaries

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.artifact_name || matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: midstate-linux-amd64
            bin_name: midstate
          
          # Raspberry Pi 3 & Zero 2 W (Cortex-A53)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: midstate-rpi3-arm64
            bin_name: midstate
            rustflags: "-C target-cpu=cortex-a53 -C link-arg=-lgcc"

          # Raspberry Pi 4 (Cortex-A72)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: midstate-rpi4-arm64
            bin_name: midstate
            rustflags: "-C target-cpu=cortex-a72 -C link-arg=-lgcc"

          # Raspberry Pi 5 (Cortex-A76)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: midstate-rpi5-arm64
            bin_name: midstate
            rustflags: "-C target-cpu=cortex-a76 -C link-arg=-lgcc"

          # Windows (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: midstate-windows-amd64.exe
            bin_name: midstate.exe
          
          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: midstate-macos-amd64
            bin_name: midstate
          
          # macOS (Apple Silicon / M1 / M2)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: midstate-macos-arm64
            bin_name: midstate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update 
        sudo apt-get install -y build-essential cmake
        # Install aarch64 cross-compiler if the target requires it
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu
        fi

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        # Cache keyed by artifact name to prevent the Pi builds from thrashing each other
        key: ${{ matrix.target }}-${{ matrix.artifact_name }}

    - name: Build Release
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        RUSTFLAGS: ${{ matrix.rustflags || '' }}
      # Building with the stark-prover feature enabled
      run: cargo build --release --features stark-prover --target ${{ matrix.target }}

    - name: Rename Binary for Artifacts (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: mv target/${{ matrix.target }}/release/${{ matrix.bin_name }} target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Rename Binary for Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: Rename-Item -Path "target\${{ matrix.target }}\release\${{ matrix.bin_name }}" -NewName "${{ matrix.artifact_name }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
