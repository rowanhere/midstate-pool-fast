name: Deploy Web Wallet and Architecture Site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'wasm-wallet/**'
      - 'src/core/**'
      - 'src/wallet/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- RUST & WASM BUILD ---
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Wasm Wallet
        run: |
          cd wasm-wallet
          wasm-pack build --target web --release

      # --- NODE & JS BUNDLE BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WebRTC Light Client
        run: |
          cd wasm-wallet
          npm install
          npx rollup -c rollup.config.mjs

      # --- STAGING & DEPLOYMENT ---
      - name: Prepare Staging Directory
        run: |
          # 1. Create a clean staging area with a subfolder for the wallet app
          mkdir -p staging/wallet
          
          # 2. Copy the Architecture Site (now in wasm-wallet/website) to the ROOT of staging
          cp -r wasm-wallet/website/* staging/
          
          # Add this line to tell GitHub about the custom domain
          #echo "midstate.cash" > staging/CNAME
          
          # 3. Copy the Wasm Wallet files to the '/wallet' subdirectory
          cp wasm-wallet/index.html staging/wallet/
          cp wasm-wallet/manifest.json staging/wallet/
          cp wasm-wallet/sw.js staging/wallet/
          cp wasm-wallet/worker.js staging/wallet/
          # Copy the new miner worker and the bundled WebRTC client
          cp wasm-wallet/miner.js staging/wallet/
          cp wasm-wallet/light_client.bundle.js staging/wallet/
          cp -r wasm-wallet/pkg staging/wallet/
          
          # 4. Verification for logs
          echo "Final Deployment Structure:"
          ls -R staging

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 1. Download the staging folder we built in the previous job
      - name: Download Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./staging

      # 2. Deploy to Legacy GitHub Pages (.github.io)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 3. Deploy the exact same files to Cloudflare Pages (midstate.cash)
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'midstate' 
          directory: './staging'
