<script>
let tipHeight = 0;
let activeBatch = null;
let activeAddress = null;
let activeQuery = null;

// blockCache stores {txCount, cbCount} keyed by height, populated when blocks are loaded
const blockCache = {};

let currentTab = 'explorer';
let lastMempoolData = null;
let lastState = null;
// Reveal cards the user has expanded in the mempool view, keyed by first
// input coin id so expansion survives the 4s poll re-render.
const mpExpanded = new Set();
// One-shot flag: scroll the mempool view to the search match on next render.
let mpScrollPending = false;
// What the main panel currently shows: 'welcome' | 'mempool' | 'block' | 'analytics'.
// Guards the mempool renderer's skip-identical logic against stale snapshots.
let mainViewContent = 'welcome';
let lastMempoolHtml = '';
let lastBatchListHtml = '';


// ── Helpers ─────────────────────────────────────────────────────────────

// ==================== BLAKE3 ====================
// Pure-JS BLAKE3, byte-identical to the Rust `blake3` crate (v1.5.0) the node
// uses. Verified against 535 vectors generated from that crate.
//
// It replaces an implementation that was not BLAKE3 at all: it flagged every
// block CHUNK_START, never CHUNK_END, advanced the counter per 64-byte block
// instead of per 1024-byte chunk, and finalised over an empty block. It
// returned the wrong digest for every input including "abc" — so the /scan PoW
// gate could never pass: the client mined against its own hash while the server
// recomputed the real one and rejected every submission.
//
// TWO ENTRY POINTS, AND THE DIFFERENCE MATTERS:
//   blake3Hex(str)        -> hashes the UTF-8 BYTES OF THE STRING.
//                            Use for the PoW preimage: the server computes
//                            blake3::hash(input.as_bytes()) over "addr:h:ts:nonce".
//   blake3_hash_hex(hex)  -> DECODES the hex first, then hashes those bytes.
//                            Use for address checksums: blake3(address_bytes)[0..4].
// Mixing them up yields a valid-looking wrong hash.
(function() {
  const OUT_LEN = 32;
  const KEY_LEN = 32;
  const BLOCK_LEN = 64;
  const CHUNK_LEN = 1024;

  const CHUNK_START = 1 << 0;
  const CHUNK_END = 1 << 1;
  const PARENT = 1 << 2;
  const ROOT = 1 << 3;
  const KEYED_HASH = 1 << 4;
  const DERIVE_KEY_CONTEXT = 1 << 5;
  const DERIVE_KEY_MATERIAL = 1 << 6;

  // The SHA-256 initialisation vector.
  const IV = Uint32Array.of(
    0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
    0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19,
  );

  const MSG_PERMUTATION = Uint8Array.of(2, 6, 3, 10, 7, 0, 4, 13, 1, 11, 12, 5, 9, 14, 15, 8);

  // ── 32-bit primitives ────────────────────────────────────────────────────────
  // JS numbers are doubles, so a+b+c for three uint32 tops out around 2^33.6 —
  // well inside the 2^53 exact-integer range. The `>>> 0` then truncates to
  // uint32, giving exactly Rust's wrapping_add.
  const rotr = (x, n) => ((x >>> n) | (x << (32 - n))) >>> 0;

  function g(s, a, b, c, d, mx, my) {
    s[a] = (s[a] + s[b] + mx) >>> 0;
    s[d] = rotr(s[d] ^ s[a], 16);
    s[c] = (s[c] + s[d]) >>> 0;
    s[b] = rotr(s[b] ^ s[c], 12);
    s[a] = (s[a] + s[b] + my) >>> 0;
    s[d] = rotr(s[d] ^ s[a], 8);
    s[c] = (s[c] + s[d]) >>> 0;
    s[b] = rotr(s[b] ^ s[c], 7);
  }

  function round(s, m) {
    // Columns.
    g(s, 0, 4, 8, 12, m[0], m[1]);
    g(s, 1, 5, 9, 13, m[2], m[3]);
    g(s, 2, 6, 10, 14, m[4], m[5]);
    g(s, 3, 7, 11, 15, m[6], m[7]);
    // Diagonals.
    g(s, 0, 5, 10, 15, m[8], m[9]);
    g(s, 1, 6, 11, 12, m[10], m[11]);
    g(s, 2, 7, 8, 13, m[12], m[13]);
    g(s, 3, 4, 9, 14, m[14], m[15]);
  }

  const _permScratch = new Uint32Array(16);
  function permute(m) {
    for (let i = 0; i < 16; i++) _permScratch[i] = m[MSG_PERMUTATION[i]];
    m.set(_permScratch);
  }

  /**
   * The BLAKE3 compression function. Returns all 16 state words: callers take
   * the first 8 as a chaining value, or all 16 for root output.
   * @param {Uint32Array} cv 8 words
   * @param {Uint32Array} blockWords 16 words
   * @param {number} counter u64 as a JS number (exact below 2^53; a chunk
   *   counter that large would need ~2^63 bytes of input)
   */
  function compress(cv, blockWords, counter, blockLen, flags) {
    const s = new Uint32Array(16);
    s[0] = cv[0]; s[1] = cv[1]; s[2] = cv[2]; s[3] = cv[3];
    s[4] = cv[4]; s[5] = cv[5]; s[6] = cv[6]; s[7] = cv[7];
    s[8] = IV[0]; s[9] = IV[1]; s[10] = IV[2]; s[11] = IV[3];
    s[12] = counter >>> 0;                        // counter low word
    s[13] = Math.floor(counter / 0x100000000) >>> 0;  // counter high word
    s[14] = blockLen >>> 0;
    s[15] = flags >>> 0;

    const m = Uint32Array.from(blockWords);       // permute mutates; don't touch the caller's copy

    // 7 rounds, permuting between them (6 permutations).
    round(s, m); permute(m);
    round(s, m); permute(m);
    round(s, m); permute(m);
    round(s, m); permute(m);
    round(s, m); permute(m);
    round(s, m); permute(m);
    round(s, m);

    for (let i = 0; i < 8; i++) {
      s[i] = (s[i] ^ s[i + 8]) >>> 0;
      s[i + 8] = (s[i + 8] ^ cv[i]) >>> 0;
    }
    return s;
  }

  function first8(words) { return words.slice(0, 8); }

  /** Read 16 little-endian u32 from a 64-byte block. */
  function wordsFromLeBytes64(bytes, out) {
    for (let i = 0; i < 16; i++) {
      const o = i * 4;
      out[i] = (bytes[o] | (bytes[o + 1] << 8) | (bytes[o + 2] << 16) | (bytes[o + 3] << 24)) >>> 0;
    }
    return out;
  }

  // ── Output ───────────────────────────────────────────────────────────────────
  // A node's compression inputs, deferred: the same words yield either a chaining
  // value (feeding a parent) or the root hash (with ROOT set). Deferring is what
  // lets BLAKE3 decide "am I the root?" only at finalize.
  class Output {
    constructor(inputCv, blockWords, counter, blockLen, flags) {
      this.inputCv = inputCv;
      this.blockWords = blockWords;
      this.counter = counter;
      this.blockLen = blockLen;
      this.flags = flags;
    }
    chainingValue() {
      return first8(compress(this.inputCv, this.blockWords, this.counter, this.blockLen, this.flags));
    }
    /** Root bytes. Each 64-byte output block bumps the counter, so this extends
     *  to arbitrary length — Midstate only ever asks for 32. */
    rootOutputBytes(out) {
      let blockCounter = 0;
      for (let off = 0; off < out.length; off += 2 * OUT_LEN) {
        const words = compress(this.inputCv, this.blockWords, blockCounter, this.blockLen, this.flags | ROOT);
        const take = Math.min(2 * OUT_LEN, out.length - off);
        for (let i = 0; i < take; i++) {
          out[off + i] = (words[i >> 2] >>> (8 * (i & 3))) & 0xff;
        }
        blockCounter++;
      }
      return out;
    }
  }

  // ── ChunkState ───────────────────────────────────────────────────────────────
  // One 1024-byte leaf: up to 16 blocks compressed in sequence. The first block
  // carries CHUNK_START, the last CHUNK_END.
  class ChunkState {
    constructor(keyWords, chunkCounter, flags) {
      this.cv = Uint32Array.from(keyWords);
      this.chunkCounter = chunkCounter;
      this.block = new Uint8Array(BLOCK_LEN);
      this.blockLen = 0;
      this.blocksCompressed = 0;
      this.flags = flags;
      this._words = new Uint32Array(16);
    }
    len() { return BLOCK_LEN * this.blocksCompressed + this.blockLen; }
    startFlag() { return this.blocksCompressed === 0 ? CHUNK_START : 0; }
    update(input, start, end) {
      let i = start;
      while (i < end) {
        if (this.blockLen === BLOCK_LEN) {
          wordsFromLeBytes64(this.block, this._words);
          this.cv = first8(compress(this.cv, this._words, this.chunkCounter, BLOCK_LEN, this.flags | this.startFlag()));
          this.blocksCompressed++;
          this.block.fill(0);
          this.blockLen = 0;
        }
        const want = BLOCK_LEN - this.blockLen;
        const take = Math.min(want, end - i);
        this.block.set(input.subarray(i, i + take), this.blockLen);
        this.blockLen += take;
        i += take;
      }
    }
    output() {
      const words = wordsFromLeBytes64(this.block, new Uint32Array(16));
      return new Output(this.cv, words, this.chunkCounter, this.blockLen, this.flags | this.startFlag() | CHUNK_END);
    }
  }

  function parentOutput(leftCv, rightCv, keyWords, flags) {
    const blockWords = new Uint32Array(16);
    blockWords.set(leftCv, 0);
    blockWords.set(rightCv, 8);
    return new Output(Uint32Array.from(keyWords), blockWords, 0, BLOCK_LEN, PARENT | flags);
  }
  function parentCv(leftCv, rightCv, keyWords, flags) {
    return parentOutput(leftCv, rightCv, keyWords, flags).chainingValue();
  }

  // ── Hasher ───────────────────────────────────────────────────────────────────
  class Blake3 {
    constructor(keyWords = IV, flags = 0) {
      this.keyWords = Uint32Array.from(keyWords);
      this.chunkState = new ChunkState(this.keyWords, 0, flags);
      this.cvStack = [];
      this.flags = flags;
    }

    /**
     * Merge completed subtrees.
     *
     * The stack discipline is the whole trick: the number of trailing zero bits
     * in `totalChunks` is exactly how many subtrees are now complete and must be
     * merged. That reproduces BLAKE3's canonical left-leaning tree without ever
     * materialising it.
     */
    _addChunkChainingValue(newCv, totalChunks) {
      let cv = newCv;
      let n = totalChunks;
      while ((n & 1) === 0) {
        cv = parentCv(this.cvStack.pop(), cv, this.keyWords, this.flags);
        n = Math.floor(n / 2);      // n >>= 1, but safe past 2^31
      }
      this.cvStack.push(cv);
      return this;
    }

    update(data) {
      const input = toBytes(data);
      let i = 0;
      while (i < input.length) {
        if (this.chunkState.len() === CHUNK_LEN) {
          const chunkCv = this.chunkState.output().chainingValue();
          const totalChunks = this.chunkState.chunkCounter + 1;
          this._addChunkChainingValue(chunkCv, totalChunks);
          this.chunkState = new ChunkState(this.keyWords, totalChunks, this.flags);
        }
        const want = CHUNK_LEN - this.chunkState.len();
        const take = Math.min(want, input.length - i);
        this.chunkState.update(input, i, i + take);
        i += take;
      }
      return this;
    }

    /** @param {number} length output bytes (default 32) */
    finalize(length = OUT_LEN) {
      let output = this.chunkState.output();
      // Fold the stack right-to-left; the last fold becomes the root.
      for (let i = this.cvStack.length - 1; i >= 0; i--) {
        output = parentOutput(this.cvStack[i], output.chainingValue(), this.keyWords, this.flags);
      }
      return output.rootOutputBytes(new Uint8Array(length));
    }
  }

  // ── Input coercion ───────────────────────────────────────────────────────────
  function toBytes(data) {
    if (data instanceof Uint8Array) return data;
    if (typeof data === 'string') return new TextEncoder().encode(data);
    if (data instanceof ArrayBuffer) return new Uint8Array(data);
    if (ArrayBuffer.isView(data)) return new Uint8Array(data.buffer, data.byteOffset, data.byteLength);
    if (Array.isArray(data)) return Uint8Array.from(data);
    throw new TypeError('blake3: expected Uint8Array, ArrayBuffer, string or number[]');
  }

  // ── Public API ───────────────────────────────────────────────────────────────

  /** Equivalent to Rust `blake3::hash(data)`. @returns {Uint8Array} 32 bytes */
  function blake3(data, length = OUT_LEN) {
    return new Blake3().update(data).finalize(length);
  }

  /** Hex convenience. Equivalent to `hex::encode(blake3::hash(data).as_bytes())`. */
  function blake3Hex(data, length = OUT_LEN) {
    return bytesToHex(blake3(data, length));
  }

  /**
   * Drop-in for the wallet's WASM export `blake3_hash_hex(hex_data)`.
   *
   * NB the semantics: it takes a HEX STRING, decodes it to bytes, hashes those,
   * and returns hex. It does NOT hash the string's characters. Matches the Rust
   * wrapper including its quirk of treating undecodable input as empty
   * (`hex::decode(..).unwrap_or_default()`), so a malformed argument hashes the
   * empty string rather than throwing.
   */
  function blake3_hash_hex(hexData) {
    let bytes;
    try { bytes = hexToBytes(hexData); } catch (_) { bytes = new Uint8Array(0); }
    return bytesToHex(blake3(bytes));
  }

  /** Rust `blake3::keyed_hash(key, data)`. Unused by Midstate; untested here. */
  function keyedHash(key, data, length = OUT_LEN) {
    const k = toBytes(key);
    if (k.length !== KEY_LEN) throw new Error('blake3: key must be exactly 32 bytes');
    const keyWords = wordsFromLeBytes32(k);
    return new Blake3(keyWords, KEYED_HASH).update(data).finalize(length);
  }

  /** Rust `blake3::derive_key(context, key_material)`. Unused by Midstate; untested here. */
  function deriveKey(context, keyMaterial, length = OUT_LEN) {
    const ctxCv = new Blake3(IV, DERIVE_KEY_CONTEXT).update(context).finalize(KEY_LEN);
    return new Blake3(wordsFromLeBytes32(ctxCv), DERIVE_KEY_MATERIAL).update(keyMaterial).finalize(length);
  }

  function wordsFromLeBytes32(bytes) {
    const w = new Uint32Array(8);
    for (let i = 0; i < 8; i++) {
      const o = i * 4;
      w[i] = (bytes[o] | (bytes[o + 1] << 8) | (bytes[o + 2] << 16) | (bytes[o + 3] << 24)) >>> 0;
    }
    return w;
  }

  const HEX = Array.from({ length: 256 }, (_, i) => i.toString(16).padStart(2, '0'));
  function bytesToHex(b) {
    let s = '';
    for (let i = 0; i < b.length; i++) s += HEX[b[i]];
    return s;
  }
  function hexToBytes(h) {
    const s = String(h).replace(/^0x/i, '');
    if (s.length % 2 !== 0 || /[^0-9a-fA-F]/.test(s)) throw new Error('blake3: invalid hex');
    const out = new Uint8Array(s.length / 2);
    for (let i = 0; i < out.length; i++) out[i] = parseInt(s.substr(i * 2, 2), 16);
    return out;
  }


  // Public surface.
  window.blake3Bytes     = blake3;            // (data[, len]) -> Uint8Array
  window.blake3Hex       = blake3Hex;         // (string|bytes) -> hex  [UTF-8 semantics]
  window.blake3_hash_hex = blake3_hash_hex;   // (hexString)    -> hex  [hex-decode semantics]
  window.Blake3          = Blake3;            // streaming hasher
})();

// ==================== PoW (for /scan and /search) ====================
// The node gates its expensive endpoints on a small proof of work. Both use the
// SAME preimage shape, verified server-side in handlers.rs as:
//
//     blake3(format!("{}:{}:{}:{}", subject, height, timestamp, nonce))
//
// and require the lowercase hex digest to start with "0000" (4 hex zeros = 16
// bits). `subject` is the address for /scan and the query for /search; /search
// pins height to 0 since it has no start_height.
//
// Two things this must get exactly right, both of which were previously wrong:
//   1. Hash the STRING's UTF-8 bytes (blake3Hex), not a hex decode of it.
//   2. Mine on the SAME height that the request body sends. Mining against one
//      value and submitting another guarantees "Invalid PoW hash".
// The server decides difficulty; we never guess. Kept only as a floor for the
// display and as a fallback if /pow_params is unreachable on an older node.
const POW_FALLBACK_ZEROS = 4;

/** Ask the node what this client owes for its next expensive request. Free. */
async function fetchPowParams() {
    try {
        const r = await fetch('/pow_params');
        if (!r.ok) return null;
        const p = await r.json();
        if (!Number.isFinite(p.zeros)) return null;
        // Guard against a hostile/broken node asking for an absurd solve.
        // 7 hex zeros is ~36 minutes in this implementation.
        if (p.zeros > 6) {
            log(`Node is asking for ${p.zeros} zeros of work — refusing (that is ~${Math.round(Math.pow(16, p.zeros) / 124000 / 60)} min).`, 'e');
            return null;
        }
        // A clock >120s fast/slow makes the server reject on timestamp alone;
        // say so before spending a solve on it.
        if (Number.isFinite(p.server_time)) {
            const skew = Math.abs(p.server_time - Math.floor(Date.now() / 1000));
            if (skew > 120) log(`Warning: your clock is ${skew}s off the node's — proofs may be rejected.`, 'w');
        }
        return p;
    } catch (_) { return null; }
}

async function solvePow(subject, height, zeros = POW_FALLBACK_ZEROS, onProgress) {
    const timestamp = Math.floor(Date.now() / 1000);  // server allows -600s/+120s
    const prefix = '0'.repeat(zeros);
    const started = Date.now();
    let nonce = 0, hash = '';
    for (;;) {
        hash = window.blake3Hex(`${subject}:${height}:${timestamp}:${nonce}`);
        if (hash.startsWith(prefix)) break;
        nonce++;
        // ~124k hashes/sec, so 4 zeros averages ~0.5s. Yield often enough that
        // the tab stays responsive, and report progress so a slow solve doesn't
        // look like a hang.
        if (nonce % 4096 === 0) {
            if (onProgress && nonce % 262144 === 0) {
                const secs = (Date.now() - started) / 1000;
                onProgress(nonce, secs);
            }
            await new Promise(r => setTimeout(r, 0));
        }
    }
    return { nonce, timestamp, hash };
}

/** POST /search with the proof the server currently demands.
 *
 *  The difficulty is re-derived server-side at verification, so a quote can go
 *  stale if another request from this IP lands mid-solve. That costs one retry,
 *  never correctness — so quote, mine, submit, and on "difficulty too low"
 *  re-quote once. There is deliberately no local escalation policy: the old one
 *  lived in localStorage, was trivially edited, and so only ever taxed honest
 *  users while an abuser paid the floor.
 */
async function searchWithPow(query) {
    const submit = async (zeros) => {
        const pow = await solvePow(query, 0, zeros,
            (n, s) => log(`  ...solving search PoW (${zeros} zeros): ${n.toLocaleString()} hashes, ${s.toFixed(0)}s`, 'i'));
        return fetch('/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, pow })
        });
    };

    const params = await fetchPowParams();
    let res = await submit(params ? params.zeros : POW_FALLBACK_ZEROS);
    if (res.ok) return res;

    // Outbid mid-solve, or we were working from a stale/absent quote.
    const body = await res.clone().text().catch(() => '');
    if (/difficulty too low/i.test(body)) {
        const again = await fetchPowParams();
        if (again) {
            log(`Difficulty rose to ${again.zeros} zeros — re-solving.`, 'w');
            res = await submit(again.zeros);
        }
    }
    return res;
}


function validateAddressChecksum(addr) {
    if (addr.length !== 72) return { valid: false, reason: 'Not a 72-char address' };

    const addressPart = addr.substring(0, 64).toLowerCase();
    const providedChecksum = addr.substring(64).toLowerCase();

    if (!/^[0-9a-f]{64}$/.test(addressPart)) return { valid: false, reason: 'Invalid hex in address' };

    try {
        // Node: encode_address_with_checksum() = blake3(address_BYTES)[0..4].
        // blake3_hash_hex decodes the hex before hashing, which is exactly that.
        // (Passing the hex STRING to a UTF-8 hasher would hash 64 characters
        // instead of 32 bytes — the old bug here.)
        const hash = window.blake3_hash_hex(addressPart);

        const expectedChecksum = hash.substring(0, 8).toLowerCase();

        if (expectedChecksum === providedChecksum) {
            return { valid: true, canonical: addressPart };
        } else {
            return { 
                valid: false, 
                reason: `Checksum mismatch (expected ${expectedChecksum})` 
            };
        }
    } catch (e) {
        return { valid: false, reason: 'Invalid hex in address' };
    }
}


function toHex(v) {
    if (!v) return '';
    if (typeof v === 'string') return v;
    return Array.from(v).map(b => b.toString(16).padStart(2,'0')).join('');
}

function toAscii(v) {
    let bytes = [];
    if (typeof v === 'string') {
        for (let i = 0; i < v.length; i += 2)
            bytes.push(parseInt(v.substring(i, i+2), 16));
    } else if (v) {
        bytes = Array.from(v);
    }
    return bytes.map(b => (b >= 32 && b <= 126) ? String.fromCharCode(b) : '\u00b7').join('');
}

function shortHex(h) {
    h = toHex(h);
    if (h.length <= 16) return h;
    return h.substring(0,8) + '\u2026' + h.substring(h.length-8);
}

function fmtAge(secs) {
    if (secs == null) return '';
    if (secs < 60) return secs + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm';
    const m = Math.floor((secs % 3600) / 60);
    return Math.floor(secs / 3600) + 'h' + (m ? ' ' + m + 'm' : '');
}

function hexLink(hex, label) {
    const h = toHex(hex);
    if (!h) return '<span style="color:var(--text-faint)">-</span>';
    const display = label || shortHex(h);
    const cls = (activeQuery && h === activeQuery) ? ' hl' : '';
    return `<a class="${cls}" onclick="execCmd('${h}')" title="${h}">${display}</a>`;
}

function addressLink(addr) {
    const h = toHex(addr);
    if (!h) return '<span style="color:var(--text-faint)">-</span>';
    return `<a onclick="loadAddress('${h}')" title="${h}" style="text-decoration:underline; text-decoration-color:var(--border); cursor:pointer;">${shortHex(h)}</a>`;
}

// ── MidstateScript Decompiler (makes the explorer much cooler) ───────────
const OPCODES = {
  0x01: { name: 'OP_PUSH_DATA', type: 'push' },
  0x10: { name: 'OP_DROP', type: 'stack' },
  0x11: { name: 'OP_DUP', type: 'stack' },
  0x12: { name: 'OP_SWAP', type: 'stack' },
  0x13: { name: 'OP_OVER', type: 'stack' },
  0x14: { name: 'OP_ROT', type: 'stack' },
  0x15: { name: 'OP_SLICE', type: 'stack' },
  0x16: { name: 'OP_CONCAT', type: 'stack' },
  0x17: { name: 'OP_PICK', type: 'stack' },
  0x20: { name: 'OP_EQUAL', type: 'compare' },
  0x21: { name: 'OP_VERIFY', type: 'compare' },
  0x22: { name: 'OP_EQUALVERIFY', type: 'compare' },
  0x23: { name: 'OP_ADD', type: 'math' },
  0x24: { name: 'OP_GREATER_OR_EQUAL', type: 'math' },
  0x25: { name: 'OP_SUB', type: 'math' },
  0x26: { name: 'OP_MUL', type: 'math' },
  0x27: { name: 'OP_DIV', type: 'math' },
  0x28: { name: 'OP_MOD', type: 'math' },
  0x29: { name: 'OP_SIZE', type: 'stack' },
  0x30: { name: 'OP_HASH', type: 'crypto' },
  0x31: { name: 'OP_CHECKSIG', type: 'crypto' },
  0x32: { name: 'OP_CHECKSIGVERIFY', type: 'crypto' },
  0x33: { name: 'OP_CHECKTIMEVERIFY', type: 'crypto' },
  0x40: { name: 'OP_IF', type: 'control' },
  0x41: { name: 'OP_ELSE', type: 'control' },
  0x42: { name: 'OP_ENDIF', type: 'control' },
  0x50: { name: 'OP_SUM_TO_ADDR', type: 'covenant' },
  0x51: { name: 'OP_READ_INPUT_STATE', type: 'covenant' },
  0x52: { name: 'OP_READ_OUTPUT_STATE', type: 'covenant' },
  0x53: { name: 'OP_INPUT_VALUE', type: 'covenant' },
  0x54: { name: 'OP_OUTPUT_ADDRESS', type: 'covenant' },
  0x55: { name: 'OP_THIS_ADDRESS', type: 'covenant' },
};

function disassembleScript(hexOrBytes) {
  let bytes = [];
  if (typeof hexOrBytes === 'string') {
    const clean = hexOrBytes.replace(/[^0-9a-fA-F]/g, '');
    for (let i = 0; i < clean.length; i += 2) {
      bytes.push(parseInt(clean.substr(i, 2), 16));
    }
  } else if (Array.isArray(hexOrBytes)) {
    bytes = hexOrBytes;
  } else {
    return '<span class="comment">// invalid bytecode</span>';
  }

  if (bytes.length === 0) return '<span class="comment">// empty script</span>';

  let out = '';
  let i = 0;
  let indent = 0;
  let byteOffset = 0;

  /** Interpret pushed bytes as the script VM does: a little-endian integer.
   *  Mirrors OP_ADD / OP_GREATER_OR_EQUAL / OP_CHECKTIMEVERIFY, which all read
   *  stack items this way — so an 8-byte push next to CHECKTIMEVERIFY is a
   *  block height, and showing it as such is the whole point of the annotation.
   *  BigInt because a u64 height exceeds Number's exact range. */
  function pushDataToInt(data) {
    let v = 0n;
    for (let k = data.length - 1; k >= 0; k--) v = (v << 8n) | BigInt(data[k]);
    return v;
  }

  function formatPushData(data) {
    const dataHex = data.map(x => x.toString(16).padStart(2,'0')).join('');
    let annotation = '';

    // Was: hexLEToInt(dataHex) — a function that does not exist anywhere in this
    // file. The surrounding try/catch swallowed the ReferenceError, so this
    // annotation silently never rendered for any script.
    if (data.length > 0 && data.length <= 8) {
      annotation = ` <span class="comment">// ${pushDataToInt(data).toString()}</span>`;
    }

    const ascii = data.every(x => x >= 32 && x <= 126)
      ? ` <span class="comment">"${String.fromCharCode(...data)}"</span>`
      : '';

    return `<span class="data">${data.length} 0x${dataHex}</span>${ascii}${annotation}`;
  }

  while (i < bytes.length) {
    const startOffset = byteOffset;
    const b = bytes[i];
    const op = OPCODES[b];

    if (!op) {
      const hex = b.toString(16).padStart(2, '0');
      out += `<span class="ln">[${startOffset.toString().padStart(3,' ')}]</span> <span class="op" style="color:#ffaa66">0x${hex}</span>\n`;
      i++; byteOffset++;
      continue;
    }

    let line = `<span class="ln">[${startOffset.toString().padStart(3,' ')}]</span> ` + '  '.repeat(indent);
    line += `<span class="op ${op.type}">${op.name}</span>`;

    // PUSH_DATA
    if (b === 0x01) {
      i++; byteOffset++;
      // The length is a 2-byte LITTLE-ENDIAN u16, not one byte. The VM does:
      //     let len = u16::from_le_bytes([bytecode[pc], bytecode[pc + 1]]);
      //     pc += 2;
      // Reading a single byte here misaligned every push by exactly one, which
      // then cascaded: the pushed data came out shifted (leading with the
      // length's high byte and dropping the real last byte), the displaced byte
      // surfaced as a bogus unknown opcode, and the parser eventually ran off
      // the end and cried "<truncated>" on a perfectly valid script.
      if (i + 2 > bytes.length) {
        line += ' <span class="comment">&lt;truncated: missing 2-byte length&gt;</span>';
        out += line + '\n'; break;
      }
      const len = bytes[i] | (bytes[i + 1] << 8);
      i += 2; byteOffset += 2;
      // MAX_ITEM_SIZE from the script VM. Flag it rather than trying to render
      // a 4 GB push — the node would reject this script as ItemTooLarge.
      if (len > 131072) {
        line += ` <span class="comment">&lt;invalid: push of ${len} bytes exceeds MAX_ITEM_SIZE (131072)&gt;</span>`;
        out += line + '\n'; break;
      }
      if (i + len > bytes.length) {
        const partial = bytes.slice(i);
        line += ' ' + formatPushData(partial) + ` <span class="comment">&lt;truncated: declared ${len} bytes, ${partial.length} present&gt;</span>`;
        out += line + '\n'; break;
      }
      const data = bytes.slice(i, i + len);
      line += ' ' + formatPushData(data);
      i += len; byteOffset += len;
    } else {
      i++; byteOffset++;
    }

    // === Control Flow ===
    if (b === 0x40) { // IF
      line += ' <span class="comment">// if</span>';
      indent = Math.min(indent + 1, 8);
    } else if (b === 0x41) { // ELSE
      indent = Math.max(indent - 1, 0);
      line = `<span class="ln">[${startOffset.toString().padStart(3,' ')}]</span> ` + '  '.repeat(indent) +
             `<span class="op control">OP_ELSE</span> <span class="comment">// else</span>`;
      indent = Math.min(indent + 1, 8);
    } else if (b === 0x42) { // ENDIF
      // Dedent BEFORE rebuilding the line. The old code decremented after `line`
      // had already been composed with the block's indent, so ENDIF rendered as
      // if it were inside its own block and the dedent leaked onto the next
      // instruction.
      indent = Math.max(indent - 1, 0);
      line = `<span class="ln">[${startOffset.toString().padStart(3,' ')}]</span> ` + '  '.repeat(indent) +
             `<span class="op control">OP_ENDIF</span> <span class="comment">// endif</span>`;
    }

    // === High-level language hints (from your compiler) ===
    if (b === 0x17) line += ' <span class="comment">// local var</span>';
    if (b === 0x21 || b === 0x22) line += ' <span class="comment">// assert/require</span>';

    out += line + '\n';
  }

  return out.trim();
}

function renderScriptDisasm(bytecode) {
  if (!bytecode) return '';
  const disasm = disassembleScript(bytecode);
  const hex = typeof bytecode === 'string' ? bytecode : 
              Array.from(bytecode).map(b => b.toString(16).padStart(2,'0')).join('');
  
  return `
    <div class="script-header">MIDSTATESCRIPT — ${hex.length/2} bytes</div>
    <div class="script-disasm">${disasm}</div>
    <div style="margin-top:4px;">
      <button class="btn" style="font-size:9px; padding:2px 6px;" onclick="copyToClipboard('${hex}', this)">Copy Raw</button>
    </div>
  `;
}

function renderField(label, hex, badge) {
    const h = toHex(hex);
    const a = toAscii(hex);
    const readable = /[A-Za-z ]{6,}/.test(a);
    return `<div class="field">
        <div class="lbl">${label} ${badge||''}</div>
        <div class="hex">${hexLink(h, h)}</div>
        <div class="ascii${readable?' readable':''}">${escHtml(a)}</div>
    </div>`;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    el.textContent = `[${ts}] ${msg}`;

}

function copyToClipboard(text, btnEl) {
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
        const orig = btnEl.textContent;
        btnEl.textContent = '✓ Copied';
        setTimeout(() => { btnEl.textContent = orig; }, 1200);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const orig = btnEl.textContent;
        btnEl.textContent = '✓ Copied';
        setTimeout(() => { btnEl.textContent = orig; }, 1200);
    });
}

        return;
    }
    const mv = document.getElementById('main-view');
    activeBatch = null;
    renderBatchList();

    let canonical = addr.toLowerCase();

    // Handle 72-char checksummed addresses
    if (addr.length === 72) {
        const check = validateAddressChecksum(addr);
        if (!check.valid) {
            mv.innerHTML = `
                <div class="block-hdr"><h2>Invalid Address</h2></div>
                <div style="color:var(--red); padding:20px 0;">
                    ${check.reason}<br><br>
                    The checksum does not match. This address may contain a typo.
                </div>

            return;

async function scanAddressDeeper(addr, currentStart) {
    const mv = document.getElementById('main-view');
    const nextStart = Math.max(0, currentStart - 5000);

    if (nextStart === currentStart) {
        log('Already at genesis. No older blocks to scan.', 'w');
        return;
    }

    log(`Solving proof-of-work to scan blocks ${nextStart}–${currentStart}...`, 'i');

    // Difficulty comes from the node, not from us. The old code escalated itself
    // from a localStorage timestamp while the server checked only a fixed floor —
    // so an abuser paid the minimum forever and honest users paid the tax. All of
    // that policy is gone; see solvePow/fetchPowParams.
    //
    // Mine on `nextStart`, the exact start_height sent below: the server verifies
    // blake3("{addr}:{req.start_height}:{ts}:{nonce}"). Mining `currentStart` and
    // submitting `nextStart` guaranteed "Invalid PoW hash".
    const powParams = await fetchPowParams();
    const targetZeros = powParams ? powParams.zeros : POW_FALLBACK_ZEROS;
    if (targetZeros > POW_FALLBACK_ZEROS) {
        log(`Node requires ${targetZeros} zeros of work (recent activity from this address).`, 'w');
    }

    const startTime = Date.now();
    const { nonce, timestamp, hash: powHash } = await solvePow(addr, nextStart, targetZeros,
        (n, s) => log(`  ...still solving: ${n.toLocaleString()} hashes, ${s.toFixed(0)}s (${Math.round(n / s / 1000)}k/s)`, 'i'));

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    log(`PoW solved in ${elapsed}s (difficulty=${targetZeros} zeros). Scanning...`, 's');

    // Perform the scan
    try {
        const stateRes = await fetch('/state');
        const state = stateRes.ok ? await stateRes.json() : null;
        const tip = state ? state.height : tipHeight + 1;

        const scanRes = await fetch('/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                addresses: [addr],
                start_height: nextStart,
                end_height: currentStart,
                pow: {
                    nonce: nonce,
                    timestamp: timestamp,
                    hash: powHash
                }
            })
        });

        if (!scanRes.ok) {
            const errText = await scanRes.text();
            log(`Deeper scan failed: ${errText}`, 'e');
            return;
        }

        log('Deeper scan complete. Refreshing view...', 's');
        await loadAddress(addr);

    } catch (e) {
        log(`Deeper scan error: ${e.message}`, 'e');
    }
}

    return html;

async function poll() {
    try {
        const [sRes, mRes, pRes] = await Promise.all([
            fetch('/state'), fetch('/mempool'), fetch('/peers')
        ]);
        const state = await sRes.json();
        const mempool = await mRes.json();
        const peers = await pRes.json();

        const prevTip = tipHeight;
        // state.height is the next block to be mined; the highest confirmed batch is height-1
        tipHeight = Math.max(0, state.height - 1);

        document.getElementById('h-height').textContent = tipHeight;
        document.getElementById('h-mempool').textContent = mempool.size;
        document.getElementById('h-reward').textContent = state.block_reward;
        document.getElementById('h-target').textContent = toHex(state.target).substring(0,12) + '\u2026';
        document.getElementById('s-coins').textContent = state.num_coins.toLocaleString();
        document.getElementById('s-commits').textContent = state.num_commitments;
        document.getElementById('s-safe').textContent = state.safe_depth;
        document.getElementById('s-peers').textContent = peers.peers.length;
        document.getElementById('live-dot').style.background = 'var(--green)';

        lastMempoolData = mempool;
        lastState = state;

        if (prevTip > 0 && tipHeight > prevTip) {
            log(`New batch ${tipHeight}`, 'var(--green)');
        }

        renderBatchList();
        if (currentTab === 'mempool') renderMempoolView();
    } catch(e) {
        document.getElementById('live-dot').style.background = 'var(--red)';
    }
}

function renderBatchList() {
    const el = document.getElementById('batch-list');
    let html = '';
    const start = Math.max(0, tipHeight - 30);
    for (let i = tipHeight; i >= start; i--) {
        const cls = (i === activeBatch) ? ' active' : '';
        const cached = blockCache[i];
        const txLabel = cached ? `<span class="txc">${cached.txCount}tx</span>` : '';
        html += `<div class="batch-item${cls}" onclick="loadBlock(${i})">
            <span class="num">${i}</span>${txLabel}
        </div>`;
    }
    // Re-assigning innerHTML resets the sidebar's scroll position, so only
    // repaint when the list actually changed — and keep the scroll when it did.
    if (html === lastBatchListHtml) return;
    lastBatchListHtml = html;
    const prevScroll = el.scrollTop;
    el.innerHTML = html;
    el.scrollTop = prevScroll;
}

// ── Commands ────────────────────────────────────────────────────────────

async function execCmd(cmd) {
    cmd = cmd.trim();
    document.getElementById('cmd-input').value = '';
    if (!cmd) return;

    log(`> ${cmd}`, 'var(--text-max)');

    if (cmd.toLowerCase() === 'mempool') {
        switchTab('mempool');
    } else if (/^[0-9]+$/.test(cmd)) {
        switchTab('explorer');
        await loadBlock(parseInt(cmd));
    } else if (/^[0-9a-fA-F]{64}$/.test(cmd) || /^[0-9a-fA-F]{72}$/.test(cmd)) {
        switchTab('explorer');
        const h = cmd.toLowerCase();

        // Only treat 72-char strings as addresses (they have a checksum)
        if (h.length === 72) {
            const check = validateAddressChecksum(h);
            if (!check.valid) {
                const mv = document.getElementById('main-view');
                mv.innerHTML = `
                    <div class="block-hdr"><h2>Invalid Address Checksum</h2></div>
                    <div style="color:var(--red); padding: 20px 0;">
                        ${check.reason}
                    </div>
                `;
                return;
            }
            await loadAddress(h);
            return; // ← important: stop here so we don't fall through
        }

        // 64-char hex → generic hash (commitment, coin_id, etc.)
        // Use the normal search instead of forcing it into the Address view
        await searchHash(h);
    } else if (cmd.toLowerCase().startsWith('decompile ')) {
        const hex = cmd.split(' ')[1] || '';
        const mv = document.getElementById('main-view');
        if (hex.length > 10) {
            mv.innerHTML = `
                <div class="block-hdr"><h2>SCRIPT DECOMPILE</h2></div>
                ${renderScriptDisasm(hex)}
            `;
            log('Decompiled script', 'var(--green)');
        } else {
            log('Usage: decompile <bytecode-hex>', 'var(--red)');
        }
    } else {
        log('Enter height, hash, address, "mempool", or "decompile <hex>"', 'var(--red)');
    }
}

function handleTopSearch() {
    const input = document.getElementById('top-search');
    const val = input.value.trim();
    if (!val) return;
    input.value = '';
    // Reuse the command logic for consistency
    execCmd(val);
}

// ── Server-side search ──────────────────────────────────────────────────

async function searchHash(hash) {
    log(`Searching for ${shortHex(hash)}\u2026`);

    const baseHash = hash.substring(0, 64);

    try {
        // Do the backend search first to let it validate the checksum
        const res = await searchWithPow(hash);
        const data = await res.json();

        if (!res.ok) {
            log(`Error: ${data.error || 'Server error'}`, 'var(--red)');
            activeQuery = null;
            return;
        }

        // If we got here, the checksum (if any) was valid!
        activeQuery = baseHash;

        // Now check mempool and UTXO set using the verified baseHash
        const mpHit = findInMempool(baseHash);
        if (mpHit) {
            log(`In mempool: ${mpHit.desc}`, 'var(--green)');
            if (mpHit.expandId) mpExpanded.add(mpHit.expandId);
            mpScrollPending = true;
            switchTab('mempool');
        }

        const coinRes = await fetch(`/coin/${baseHash}`);
        if (coinRes.ok) {
            const coinData = await coinRes.json();
            if (coinData.exists) {
                log(`Coin is LIVE in UTXO set`, 'var(--green)');
            }
        }

        if (data.results && data.results.length > 0) {
            log(`Found ${data.results.length} result(s)`, 'var(--green)');

            // Show results summary
            const heights = [...new Set(data.results.map(r => r.height))];
            for (const r of data.results.slice(0, 10)) {
                log(`  [${r.height}] ${r.result_type}: ${r.detail}`, 'var(--text-bright)');
            }

            if (mpHit) {
                // Keep the mempool view (loading a block would overwrite it).
                log('  Staying on mempool view \u2014 type a height to open its block.', 'var(--text-faint)');
            } else if (mainViewContent === 'address') {
                // Don't clobber the Address Explorer view
                log('  Staying on Address view \u2014 type a height to open its block.', 'var(--text-faint)');
            } else {
                // Load the first matching block
                await loadBlock(heights[0]);
            }
        } else if (mpHit) {
            log('Not in any mined block yet \u2014 pending only.', 'var(--text-faint)');
        } else {
            log('No results found in last 5000 blocks.', '#884400');
            activeQuery = null;
        }
    } catch(e) {
        log(`Search error: ${e.message}`, 'var(--red)');
    }
}

// ── Midstate Dark Pool Detection ────────────────────────────────────────

function isUniformMix(txReveal) {
    if (!txReveal || !txReveal.inputs || !txReveal.outputs) return false;
    if (txReveal.inputs.length < 3 || txReveal.outputs.length < 2) return false;
    
    // Extract standard output values, ignoring DataBurns
    const standardOuts = txReveal.outputs.filter(o => o.Standard);
    if (standardOuts.length !== txReveal.outputs.length) return false; // Contains DataBurns
    
    const vals = standardOuts.map(o => o.Standard.value);
    if (vals.length === 0) return false;
    
    const denom = vals[0];
    
    // Check if valid power of 2 using bitwise trick
    if (denom === 0 || (denom & (denom - 1)) !== 0) return false;
    
    // Check uniformity: all outputs must match the exact denomination
    if (!vals.every(v => v === denom)) return false;
    
    const inVals = txReveal.inputs.map(i => i.value);
    const mixIns = inVals.filter(v => v === denom).length;
    const feeIns = inVals.filter(v => v === 1).length;
    
    // Valid mix: inputs matching the denom must equal outputs, 
    // at most 1 fee input, and no stray change.
    return (mixIns === vals.length) && (feeIns <= 1) && (mixIns + feeIns === inVals.length);
}

// Update currentTab + the tab bar WITHOUT rendering. Used by switchTab, and
// by loadBlock: clicking a batch must claim the explorer tab, otherwise the
// next poll still thinks we're on 'mempool' and repaints it over the block.
function setActiveTab(tab) {

    const link = document.querySelector(`.tab-link[onclick="switchTab('${tab}')"]`);

function switchTab(tab) {

    if (tab === 'mempool') {
        renderMempoolView();
    } else if (tab === 'analytics') {

        else {
            mv.innerHTML = `<div style="color:var(--text-faint); padding:40px 0; text-align:center;">Select a batch to view</div>`;
            mainViewContent = 'welcome';

    }
}



// Renders the Dual-Queue Mempool.
// Each column is sorted by its queue's TRUE priority key — the same order the
// mempool evicts from: commits by achieved PoW, reveals by fee-per-KB.
function renderMempoolView() {
    const mv = document.getElementById('main-view');
    const data = lastMempoolData;
    if (!data) return;

    let commits = []; let reveals = [];
    (data.transactions || []).forEach((tx) => {
        if (tx.tx_type === 'commit' || (tx.commitment && !tx.input_coins)) commits.push(tx);
        else reveals.push(tx);
    });
    commits.sort((a,b) => (b.pow_zeros ?? -1) - (a.pow_zeros ?? -1));
    reveals.sort((a,b) => (b.fee_per_kb ?? b.fee ?? 0) - (a.fee_per_kb ?? a.fee ?? 0));

    const reqPow = lastState ? lastState.required_pow : null;

    // Cross-link the two phases: commitments already opened by a pending reveal.
    const revealedCommits = new Set();
    reveals.forEach(r => (r.inputs || []).forEach(i => { if (i.commitment) revealedCommits.add(i.commitment); }));

    const totalFees  = reveals.reduce((s,r) => s + (r.fee || 0), 0);
    const totalBytes = reveals.reduce((s,r) => s + (r.size_bytes || 0), 0);

    let html = `<div class="block-hdr"><h2>DUAL-QUEUE MEMPOOL</h2></div><div class="mempool-split">`;

    // ── Phase 1: commit queue (priority = proof-of-work) ──
    html += `<div class="mp-col"><div class="mp-col-hdr">COMMITS (PoW QUEUE) \u2014 ${commits.length}${reqPow != null ? ` \u00b7 REQUIRED \u2265 ${reqPow} BITS` : ''}</div><div class="mp-col-body">`;
    if (commits.length === 0) {
        html += `<div class="mp-empty">No pending commits. Phase-1 queue is clear.</div>`;
    } else {
        const CAP = 200;
        commits.slice(0, CAP).forEach(c => {
            const hasPow = c.pow_zeros != null;
            const strong = hasPow && reqPow != null && c.pow_zeros >= reqPow + 2;
            const powBadge = hasPow
                ? `<span class="pow-badge${strong ? ' strong' : ''}" title="Achieved proof-of-work${reqPow != null ? ` (required \u2265 ${reqPow} bits)` : ''}">${c.pow_zeros} bits</span>`
                : '';
            const revBadge = revealedCommits.has(c.commitment)
                ? `<span class="mp-flag" title="A pending reveal in the fee market opens this commitment">reveal \u29d7</span>` : '';
            const age = c.age_secs != null ? `<span class="mp-dim mp-age" title="Waiting in the mempool">${fmtAge(c.age_secs)}</span>` : '';
            const hlCls = c.commitment === activeQuery ? ' mp-match' : '';
            html += `<div class="mp-row${hlCls}" onclick="execCmd('${c.commitment}')" title="${c.commitment}">
                <span class="mp-hash">${shortHex(c.commitment)}</span>
                <span class="mp-row-right">${age}${revBadge}${powBadge}</span>
            </div>`;
        });
        if (commits.length > CAP) html += `<div class="mp-note">+ ${commits.length - CAP} more, weakest PoW last</div>`;
    }
    html += `</div></div>`;

    // ── Phase 2: reveal queue (priority = fee per byte) ──
    const sizeStat = totalBytes > 0 ? ` \u00b7 ${(totalBytes/1024).toFixed(1)} KB` : '';
    html += `<div class="mp-col"><div class="mp-col-hdr">REVEALS (FEE MARKET) \u2014 ${reveals.length}${reveals.length ? ` \u00b7 \u03a3 FEES ${totalFees.toLocaleString()}${sizeStat}` : ''}</div><div class="mp-col-body">`;
    if (reveals.length === 0) {
        html += `<div class="mp-empty">No pending reveals. Fee market is empty.</div>`;
    } else {
        const rates = reveals.map(x => x.fee_per_kb).filter(v => v != null).sort((a,b) => a-b);
        if (rates.length >= 2) {
            const med = rates[Math.floor(rates.length / 2)];
            html += `<div class="mp-ladder" title="Fee rates waiting in the queue \u2014 pay above these to outrank them">rates /KB \u2014 top ${rates[rates.length-1]} \u00b7 median ${med} \u00b7 low ${rates[0]}</div>`;
        }
        const CAP = 100;
        reveals.slice(0, CAP).forEach((r, idx) => { html += renderMempoolReveal(r, idx); });
        if (reveals.length > CAP) html += `<div class="mp-note">+ ${reveals.length - CAP} more, cheapest per byte last</div>`;
    }
    html += `</div></div></div>`;

    // ── Disruption-free update ──
    // Re-assigning innerHTML rebuilds both scroll containers from scratch,
    // yanking the reader back to the top every poll. Three tiers instead:
    //   1. Identical repaint            -> skip entirely.
    //   2. Only the age chips ticked    -> patch their text in the live DOM.
    //   3. Genuine structural change    -> repaint, then restore scroll.
    const stripAges = h => h.replace(/(<span class="mp-dim mp-age"[^>]*>)[^<]*(<\/span>)/g, '$1$2');
    if (mainViewContent === 'mempool' && html === lastMempoolHtml) {
        // Nothing changed.
    } else if (mainViewContent === 'mempool' && stripAges(html) === stripAges(lastMempoolHtml)) {
        const newAges = [...html.matchAll(/class="mp-dim mp-age"[^>]*>([^<]*)</g)].map(m => m[1]);
        mv.querySelectorAll('.mp-age').forEach((el, i) => {
            if (newAges[i] != null) el.textContent = newAges[i];
        });
        lastMempoolHtml = html;
    } else {
        const prevMain = mv.scrollTop;
        const prevCols = Array.from(mv.querySelectorAll('.mp-col-body')).map(el => el.scrollTop);
        mv.innerHTML = html;
        lastMempoolHtml = html;
        mv.scrollTop = prevMain;
        mv.querySelectorAll('.mp-col-body').forEach((el, i) => {
            if (prevCols[i] != null) el.scrollTop = prevCols[i];
        });
    }
    mainViewContent = 'mempool';

    if (mpScrollPending) {
        mpScrollPending = false;
        const m = document.querySelector('.mp-match');
        if (m && m.scrollIntoView) m.scrollIntoView({ block: 'center' });
    }
}

// Stable identity for a pending reveal card: its first input coin id
// (a reveal always spends at least one coin, so the index fallback is
// only a belt-and-braces default).
function mpTxId(r, idx) {
    const ins = r.inputs || [];
    return (ins[0] ? ins[0].coin_id : (r.input_coins || [])[0]) || ('idx' + idx);
}

// Does a 64-hex query touch this pending reveal (coins, addresses, or the
// commitment it opens)? Drives both search hits and the match highlight.
function revealMatches(r, q) {
    if (!q) return false;
    if ((r.inputs || []).some(i => i.coin_id === q || i.commitment === q)) return true;
    if ((r.outputs || []).some(o => o.coin_id === q || o.address === q)) return true;
    return (r.input_coins || []).includes(q) || (r.output_coins || []).includes(q);
}

// Look for a query in the live mempool snapshot. Returns a description and,
// for reveals, the card id to auto-expand — or null when nothing pends.
function findInMempool(q) {
    const data = lastMempoolData;
    if (!data || !q) return null;
    const txs = data.transactions || [];
    for (let i = 0; i < txs.length; i++) {
        const t = txs[i];
        const isCommit = t.tx_type === 'commit' || (t.commitment && !t.input_coins);
        if (isCommit) {
            if (t.commitment === q) return { desc: 'pending Phase-1 commit (PoW queue)', expandId: null };
            continue;
        }
        if (!revealMatches(t, q)) continue;
        const kind = t.tx_type === 'consolidate' ? 'consolidate' : 'reveal';
        let desc = `part of a pending ${kind}`;
        if ((t.inputs || []).some(x => x.coin_id === q) || (t.input_coins || []).includes(q)) desc = `input coin of a pending ${kind}`;
        else if ((t.inputs || []).some(x => x.commitment === q)) desc = `commitment opened by a pending ${kind}`;
        else if ((t.outputs || []).some(x => x.address === q)) desc = `output address of a pending ${kind}`;
        else if ((t.outputs || []).some(x => x.coin_id === q) || (t.output_coins || []).includes(q)) desc = `output coin of a pending ${kind}`;
        return { desc, expandId: mpTxId(t, i) };
    }
    return null;
}

// Power-of-2 uniform-denomination detection on the flat mempool summary shape
// (mirrors isUniformMix, which works on the raw in-block transaction shape).
function isUniformMixSummary(r) {
    const ins = r.inputs || [];
    const outs = (r.outputs || []).filter(o => o.kind === 'standard');
    if (ins.length < 3 || outs.length < 2) return false;
    if (outs.length !== (r.outputs || []).length) return false; // contains burns/confidential
    const denom = outs[0].value;
    if (!denom || !Number.isInteger(Math.log2(denom))) return false;
    if (!outs.every(o => o.value === denom)) return false;
    const mixIns = ins.filter(i => i.value === denom).length;
    const feeIns = ins.filter(i => i.value === 1).length;
    return (mixIns === outs.length) && (feeIns <= 1) && (mixIns + feeIns === ins.length);
}

function toggleMpTx(id) {
    if (mpExpanded.has(id)) mpExpanded.delete(id); else mpExpanded.add(id);
    renderMempoolView();
}

function renderMempoolReveal(r, idx) {
    const hasDetail = Array.isArray(r.inputs);
    const ins = r.inputs || [];
    const outs = r.outputs || [];
    const nIn  = hasDetail ? ins.length  : (r.input_coins  || []).length;
    const nOut = hasDetail ? outs.length : (r.output_coins || []).length;
    const id = mpTxId(r, idx);
    const open = mpExpanded.has(id);
    const matched = revealMatches(r, activeQuery);
    const age = r.age_secs != null ? `<span class="mp-dim mp-age" title="Waiting in the mempool">${fmtAge(r.age_secs)}</span>` : '';
    const isMix = hasDetail && isUniformMixSummary(r);
    const typeStr = r.tx_type === 'consolidate' ? 'CONSOLIDATE' : 'REVEAL';
    const badge = isMix ? `<span class="badge-mix">DARK POOL MIX</span>` : '';
    const rate = r.fee_per_kb != null ? `<span class="mp-dim" title="Fee per KB \u2014 the fee market's priority key">${r.fee_per_kb}/KB</span>` : '';
    const size = r.size_bytes != null ? `<span class="mp-dim">${r.size_bytes} B</span>` : '';

    let html = `<div class="mp-tx${isMix ? ' mix' : ''}${matched ? ' mp-match' : ''}">
        <div class="mp-tx-hdr" onclick="toggleMpTx('${id}')">
            <span class="mp-caret">${open ? '\u25be' : '\u25b8'}</span>
            <span class="tx-type">${typeStr}</span>${badge}
            <span class="mp-io-count">${nIn} in \u2192 ${nOut} out</span>
            <span class="mp-hdr-right">${age}${size}${rate}<span class="fee-rate">${(r.fee ?? 0).toLocaleString()} fee</span></span>
        </div>`;

    if (open) {
        html += `<div class="mp-tx-body">`;
        if (!hasDetail) {
            // Older node: /mempool carries only coin id summaries.
            html += `<div class="mp-note">Connected node predates detailed mempool info; showing coin ids only.</div>`;
            (r.input_coins  || []).forEach(cid => { html += `<div class="mp-io-row"><span class="val-badge negative">IN</span>${hexLink(cid)}</div>`; });
            (r.output_coins || []).forEach(cid => { html += `<div class="mp-io-row"><span class="val-badge positive">OUT</span>${hexLink(cid)}</div>`; });
        } else {
            html += `<div class="mp-io-hdr">Inputs (${ins.length})</div>`;
            ins.forEach(i => {
                const commitLink = i.commitment ? `<span class="mp-dim">\u21a9 commit ${hexLink(i.commitment)}</span>` : '';
                html += `<div class="mp-io-row">
                    <span class="val-badge negative">-${i.value}</span>
                    ${hexLink(i.coin_id)}
                    ${commitLink}
                </div>`;
            });
            html += `<div class="mp-io-hdr">Outputs (${outs.length})</div>`;
            outs.forEach(o => {
                if (o.kind === 'standard') {
                    html += `<div class="mp-io-row"><span class="val-badge positive">+${o.value}</span>${hexLink(o.address)}${o.coin_id ? `<span class="mp-dim">coin ${hexLink(o.coin_id)}</span>` : ''}</div>`;
                } else if (o.kind === 'confidential') {
                    html += `<div class="mp-io-row"><span class="val-badge">CONF</span>${hexLink(o.address)}<span class="mp-dim">value hidden until reveal</span></div>`;
                } else if (o.kind === 'data_burn') {
                    const ascii = toAscii(o.payload_preview || '');
                    const truncated = (o.payload_len || 0) > 64 ? '\u2026' : '';
                    html += `<div class="mp-io-row"><span class="val-badge burn">\u{1F525} -${o.value ?? 0}</span><span class="mp-burn">${escHtml(ascii)}${truncated}</span><span class="mp-dim">${o.payload_len || 0} B payload</span></div>`;
                }
            });
            const tIn  = r.total_in  ?? ins.reduce((s,i) => s + i.value, 0);
            const tOut = r.total_out ?? 0;
            html += `<div class="mp-totals">in ${tIn.toLocaleString()} \u00b7 out ${tOut.toLocaleString()} \u00b7 fee ${(r.fee ?? (tIn - tOut)).toLocaleString()}</div>`;
        }
        html += `</div>`;
    }
    html += `</div>`;
    return html;
}

// Renders the Analytics Charts
async function renderAnalyticsView() {
    const mv = document.getElementById('main-view');
    mainViewContent = 'analytics';
    mv.innerHTML = `<div style="padding:20px; color:var(--text-faint);">Loading analytics...</div>`;
    try {
        const res = await fetch('/stats/history');
        const data = await res.json();
        const blocks = data.blocks.reverse();
        if (blocks.length === 0) return;

        const totalTxs = blocks.reduce((s, b) => s + b.tx_count, 0);
        const maxTxs = Math.max(...blocks.map(b => b.tx_count), 1);
        
        let avgTime = 0;
        if (blocks.length > 1) {
            const elapsed = blocks[blocks.length-1].timestamp - blocks[0].timestamp;
            avgTime = (elapsed / (blocks.length - 1)).toFixed(1);
        }

        let html = `<div class="block-hdr"><h2>CHAIN DYNAMICS (Last ${blocks.length} Blocks)</h2></div>`;
        
        html += `<div class="stat-grid">
            <div class="stat-box"><div class="lbl">TOTAL TXs</div><div class="val">${totalTxs}</div></div>
            <div class="stat-box"><div class="lbl">AVG BLOCK TIME</div><div class="val">${avgTime}s</div></div>
            <div class="stat-box"><div class="lbl">PEAK TX/BLOCK</div><div class="val">${maxTxs}</div></div>
        </div>`;

        // Bar Chart (Tx Count)
        let txBars = '';
        blocks.forEach(b => {
            const hPct = (b.tx_count / maxTxs) * 100;
            txBars += `<div class="bar" style="height:${Math.max(hPct, 1)}%;" title="Block ${b.height}: ${b.tx_count} txs"></div>`;
        });
        html += `<div class="chart-container">
            <div class="chart-title">Transaction Throughput</div>
            <div class="bar-chart">${txBars}</div>
        </div>`;

        // Bar Chart (Block Times)
        let timeBars = '';
        let blockTimes = blocks.map((b, i) => i === 0 ? 60 : Math.max(0, b.timestamp - blocks[i-1].timestamp));
        let maxTime = Math.max(...blockTimes, 120);

        blockTimes.forEach((t, i) => {
            const hPct = Math.min((t / maxTime) * 100, 100);
            let color = t > 180 ? 'var(--warn-accent)' : 'var(--border-bright)';
            timeBars += `<div class="bar" style="height:${Math.max(hPct, 1)}%; background:${color};" title="Block ${blocks[i].height}: ${t} seconds"></div>`;
        });
        html += `<div class="chart-container">
            <div class="chart-title">Block Times (Seconds)</div>
            <div class="bar-chart">${timeBars}</div>
        </div>`;

        mv.innerHTML = html;
    } catch(e) { mv.innerHTML = `<div style="color:var(--red);padding:20px;">Error: ${e.message}</div>`; }
}

async function loadBlock(h) {
    setActiveTab('explorer');
    mainViewContent = 'block';
    activeBatch = h;
    renderBatchList();
    const mv = document.getElementById('main-view');

    try {
        // Fetch both the block and the global state (for finality math) concurrently
        const [res, stateRes] = await Promise.all([
            fetch(`/batch/${h}`),
            fetch('/state')
        ]);
        
        if (!res.ok) throw new Error(await res.text());
        
        const b = await res.json();
        const chainState = stateRes.ok ? await stateRes.json() : null;

        // Cache tx/cb counts for the batch list
        blockCache[h] = { txCount: b.transactions.length, cbCount: b.coinbase.length };
        renderBatchList();

        // Calculate Bayesian Finality
        let finalityBadge = '';
        if (chainState) {
            const confirmations = Math.max(0, chainState.height - h);
            const isFinal = confirmations >= chainState.safe_depth;
            finalityBadge = isFinal 
                ? `<span class="badge-final">✓ FINALIZED (Depth: ${confirmations})</span>` 
                : `<span class="badge-pend">⧗ PENDING (Depth: ${confirmations} / ${chainState.safe_depth} req)</span>`;
        }

        let html = `<div class="block-hdr">
            <h2>BATCH ${h} ${finalityBadge}</h2>
            <div class="block-nav">
                ${h > 0 ? `<a onclick="loadBlock(${h-1})">◂ ${h-1}</a>` : ''}
                ${h < tipHeight ? `<a onclick="loadBlock(${h+1})">${h+1} ▸</a>` : ''}
            </div>
        </div>`;

        // Action toolbar for details control (mobile-friendly progressive disclosure)
        html += `<div class="block-toolbar">
            <button class="btn" onclick="toggleAllTxCards(true)">▾ Expand All</button>
            <button class="btn" onclick="toggleAllTxCards(false)">▸ Collapse All</button>
            <button class="btn" onclick="showRawBlock(${h}, this)">Raw JSON</button>
            <button class="btn" onclick="copyToClipboard('${b.extension ? toHex(b.extension.final_hash) : ''}', this)">Copy Block Hash</button>
        </div>`;

        // Metadata grid
        const cbTotal = b.coinbase.reduce((s,c) => s + c.value, 0);
        html += `<div class="meta-grid">
            ${renderField('Block Hash', b.extension.final_hash)}
            ${renderField('Parent', b.prev_midstate)}
            ${renderField('State Root', b.state_root)}
            <div class="field">
                <div class="lbl">Timestamp</div>
                <div class="hex" style="color:var(--text)">${new Date(b.timestamp * 1000).toISOString()}</div>
            </div>
            <div class="field">
                <div class="lbl">Block Reward</div>
                <div class="hex" style="color:var(--green)">${cbTotal.toLocaleString()} units (${b.coinbase.length} output${b.coinbase.length !== 1 ? 's' : ''})</div>
            </div>
            <div class="field">
                <div class="lbl">Nonce</div>
                <div class="hex" style="color:var(--text)">${b.extension.nonce}</div>
            </div>
            <div class="field">
                <div class="lbl">Transactions</div>
                <div class="hex" style="color:var(--text)">${b.transactions.length} tx + ${b.coinbase.length} coinbase</div>
            </div>
        </div>`;

        // Coinbase
        if (b.coinbase.length > 0) {
            let cbTotal = b.coinbase.reduce((s,c) => s + c.value, 0);
            html += `<div class="tx-card">
                <div class="tx-hdr">
                    <span class="tx-type">COINBASE</span>
                    <span class="tx-fee" style="color:var(--green)">+${cbTotal}</span>
                </div>
                <div class="tx-body">`;
            for (const cb of b.coinbase) {
                html += `<div class="io-item">
                    <span class="val-badge positive">+${cb.value}</span>
                    <div class="field"><div class="lbl">address</div><div class="hex">${addressLink(cb.address)}</div></div>
                    ${renderField('salt', cb.salt)}
                    <div style="margin-top:4px;"><span class="coin-status checking" 
                        data-addr="${toHex(cb.address)}" 
                        data-value="${cb.value}" 
                        data-salt="${toHex(cb.salt)}">checking…</span></div>
                </div>`;
            }
            html += `</div></div>`;
        }

        // Transactions
        for (let i = 0; i < b.transactions.length; i++) {
            const tx = b.transactions[i];

            if (tx.Commit) {
                html += `<div class="tx-card">
                    <div class="tx-hdr">
                        <span class="tx-type" style="color:var(--text)">TX ${i} \u2014 PHASE 1: COMMIT</span>
                        <span style="color:var(--text-muted)">PoW Nonce: ${tx.Commit.spam_nonce}</span>
                    </div>
                    <div class="tx-body">
                        ${renderField('Blinded Commitment Hash', tx.Commit.commitment)}
                        <div style="font-size: 10px; color: var(--text-muted); margin-top:4px;">Inputs and outputs are cryptographically locked. Values remain private until Reveal.</div>
                    </div>
                </div>`;
            }

            if (tx.Reveal || tx.Consolidate) {
                const data = tx.Reveal || tx.Consolidate;
                const isMix = isUniformMix(data);
                const typeStr = tx.Consolidate ? 'CONSOLIDATE' : 'REVEAL';
                const badge = isMix ? `<span class="badge-mix">DARK POOL MIX</span>` : '';
                
                let inSum = 0; let outSum = 0;
                if(data.inputs) inSum = data.inputs.reduce((s,i) => s + i.value, 0);
                if(data.outputs) outSum = data.outputs.reduce((s,o) => s + (o.Standard ? o.Standard.value : (o.DataBurn ? o.DataBurn.value_burned : 0)), 0);
                const fee = inSum - outSum;

                let inputsHtml = (data.inputs || []).map(inp => {
                    const hasScript = inp.predicate && inp.predicate.Script && inp.predicate.Script.bytecode;
                    const addr = hasScript ? inp.predicate.Script.bytecode 
                               : (inp.predicate && inp.predicate.P2pk ? inp.predicate.P2pk : inp.predicate);
                    
                    let scriptHtml = '';
                    if (hasScript) {
                        scriptHtml = `<div style="margin-top:6px; padding-left:8px; border-left:2px solid var(--border);">
                            ${renderScriptDisasm(inp.predicate.Script.bytecode)}
                        </div>`;
                    }
                    
                    return `<div class="io-item">
                        <span class="val-badge negative">-${inp.value}</span>
                        ${renderField('address / script-hash', addr)}
                        ${renderField('salt', inp.salt)}
                        ${scriptHtml}
                    </div>`;
                }).join('');

                let outputsHtml = (data.outputs || []).map(out => {
                    if (out.Standard) {
                        return `<div class="io-item">
                            <span class="val-badge positive">+${out.Standard.value}</span>
                            ${renderField('address', out.Standard.address)}
                            ${renderField('salt', out.Standard.salt)}
                            <div style="margin-top:4px;"><span class="coin-status checking"
                                data-addr="${toHex(out.Standard.address)}"
                                data-value="${out.Standard.value}"
                                data-salt="${toHex(out.Standard.salt)}">checking…</span></div>
                        </div>`;
                    }
                    if (out.DataBurn) {
                        const payload = toHex(out.DataBurn.payload);
                        const ascii = toAscii(out.DataBurn.payload);
                        const readable = /[A-Za-z ]{6,}/.test(ascii);
                        return `<div class="io-item">
                            <span class="val-badge burn">\u{1F525} -${out.DataBurn.value_burned}</span>
                            <div class="field">
                                <div class="lbl">burn payload (${payload.length/2} bytes)</div>
                                <div class="hex" style="word-break:break-all;font-size:11px;">${escHtml(payload)}</div>
                                <div class="ascii${readable?' readable':''}">${escHtml(ascii)}</div>
                            </div>
                        </div>`;
                    }
                    if (out.Confidential) {
                        return `<div class="io-item">
                            <span class="val-badge" style="color:var(--text-muted)">STATE</span>
                            ${renderField('address', out.Confidential.address)}
                            ${renderField('commitment', out.Confidential.commitment)}
                        </div>`;
                    }
                }).join('');

                html += `<div class="tx-card" ${isMix ? 'style="border: 1px dashed var(--text-muted);"' : ''}>
                    <div class="tx-hdr">
                        <span class="tx-type">TX ${i} \u2014 PHASE 2: ${typeStr} ${badge}</span>
                        <span class="tx-fee">fee: ${fee}</span>
                    </div>
                    <div class="tx-body">
                        <div class="tx-flow">
                            <div class="tx-col">
                                <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;">Inputs (${data.inputs ? data.inputs.length : 0})</div>
                                ${inputsHtml}
                            </div>
                            <div class="tx-arrow">→</div>
                            <div class="tx-col">
                                <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;">Outputs (${data.outputs ? data.outputs.length : 0})</div>
                                ${outputsHtml}
                            </div>
                        </div>
                        <div style="padding-top:8px; border-top:1px dashed var(--border); margin-top:12px;">
                            ${renderField('Unblinding Salt', data.salt)}
                        </div>
                    </div>
                </div>`;
            }
        }

        mv.innerHTML = html;
        mv.scrollTop = 0;

        checkCoinStatuses();

    } catch(e) {
        mv.innerHTML = `<div style="color:var(--red);padding:20px;">Error: ${escHtml(e.message)}</div>`;
    }
}

// Check live/spent status for all tagged coin outputs in the current view
async function checkCoinStatuses() {
    const els = document.querySelectorAll('.coin-status[data-addr]');
    // Fire requests concurrently, up to 8 at a time to avoid flooding
    const chunk = 8;
    const arr = Array.from(els);
    for (let i = 0; i < arr.length; i += chunk) {
        await Promise.all(arr.slice(i, i + chunk).map(async el => {
            try {
                const res = await fetch('/check_output', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        address: el.dataset.addr,
                        value:   parseInt(el.dataset.value, 10),
                        salt:    el.dataset.salt,
                    })
                });
                const data = await res.json();
                el.textContent  = data.exists ? 'live' : 'spent';
                el.className    = 'coin-status ' + (data.exists ? 'live' : 'spent');
                // Attach coin_id as a clickable search link now that we have it
                if (data.coin_id) {
                    el.style.cursor = 'pointer';
                    el.title = data.coin_id;
                    el.onclick = () => execCmd(data.coin_id);
                }
            } catch {
                el.textContent = '?';
                el.className   = 'coin-status checking';
            }
        }));
    }
}

// Visibility-aware polling: 3s while the tab is visible, 15s in the
// background, and an immediate refresh the moment the tab regains focus.
let pollTimer = null;
function schedulePoll() {
    clearTimeout(pollTimer);
    pollTimer = setTimeout(async () => { await poll(); schedulePoll(); }, document.hidden ? 15000 : 3000);
}
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) poll();
    schedulePoll();
});
poll();
schedulePoll();

// --- NEW: Deep Linking / URL Parameter Parsing ---
// Supports:
// 1. /?q=123
// 2. /?query=a1b2c3d4...
// 3. /?123  (Cleanest format)
const params = new URLSearchParams(window.location.search);
let initQuery = params.get('q') || params.get('query');

// If they didn't use 'q=' but just put a value after the '?', grab that instead
if (!initQuery && window.location.search.length > 1 && !window.location.search.includes('=')) {
    initQuery = window.location.search.substring(1);
}

if (initQuery) {
    // Decode in case the browser encoded it, and strip any trailing slashes
    const cleanQuery = decodeURIComponent(initQuery).replace(/\/$/, '');
    
    // Wait 100ms to allow the initial poll() to fetch the chain tip and set up the UI
    setTimeout(() => {
        document.getElementById('cmd-input').value = cleanQuery;
        execCmd(cleanQuery);
    }, 100);
}
